<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB88 DEMO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('https://i.postimg.cc/HxqQT9qM/51918d4a-414e-4e49-b60e-6573301f0af5.jpg') no-repeat center center fixed;
  background-size:cover;
  padding-bottom:70px;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:linear-gradient(90deg,#020024,#090979,#00d4ff);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{ height:38px; }

.logo-text{
  font-weight:bold;
  font-size:16px;
  color:#ffd700;
}

/* BUTTON */
.btn-group{
  display:flex;
  gap:10px;
}

.btn-login,.btn-daftar{
  background:#ffd700;
  color:#000;
  padding:8px 18px;
  border-radius:25px;
  font-weight:bold;
  text-decoration:none;
}

/* GAME GRID */
.game-list{
  max-width:1200px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:10px;
}

/* 🔥 CARD GAME ANIMASI */
.game{
  background:rgba(0,0,0,0.8);
  border-radius:14px;
  padding:8px;
  text-align:center;
  position:relative;
  overflow:hidden;
  transition:0.3s;
}

/* glow border */
.game::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;
  padding:2px;
  background:linear-gradient(45deg,#00eaff,#00ffcc,#00eaff);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  opacity:0;
  transition:0.3s;
}

.game:hover::before{
  opacity:1;
}

.game:hover{
  transform:translateY(-8px) scale(1.05);
  box-shadow:0 0 25px #00eaff;
}

/* IMAGE */
.game img{
  width:100%;
  border-radius:10px;
}

/* TITLE */
.game-title{
  font-size:13px;
  color:#fff;
  margin-top:5px;
}

/* 🔥 BUTTON MAIN */
.play-btn{
  background:linear-gradient(45deg,#003cff,#00c3ff);
  color:#ffd700;
  border:none;
  padding:8px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  position:relative;
  overflow:hidden;
}

/* efek klik */
.play-btn:active{
  transform:scale(0.95);
}

/* flash klik */
.play-btn::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.3);
  top:0;
  left:-100%;
  transition:0.3s;
}

.play-btn.clicked::after{
  left:100%;
}

/* MOBILE */
@media(max-width:768px){
  .game-list{ grid-template-columns:repeat(2,1fr); }
}

/* DESKTOP */
@media(min-width:1024px){
  .game-list{ grid-template-columns:repeat(6,1fr); }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <img src="https://cb88fulljpterus.com/storage/webpersonalize/7f9c6642-389e-4312-981d-de077aee6551.gif">
    <div class="logo-text">CB88 DEMO</div>
  </div>

  <div class="btn-group">
    <a href="#" class="btn-login">MASUK</a>
    <a href="#" class="btn-daftar">DAFTAR</a>
  </div>
</div>

<div class="game-list">

  <!-- GAME -->
  <div class="game">
    <img src="https://i.postimg.cc/vZ26qrvR/vswaysmahwblck.webp">
    <div class="game-title">Mahjong Wins 3</div>
    <button class="play-btn" onclick="go(this,'https://simulasikan.cfd/pragmatic-play/mahjong-wins-3')">Main</button>
  </div>

  <div class="game">
    <img src="https://dsuown9evwz4y.cloudfront.net/Images/providers/PP/vs20swbonsup.jpg">
    <div class="game-title">Sweet Bonanza Super Scatter</div>
    <button class="play-btn" onclick="go(this,'https://simulasikan.cfd/pragmatic-play/sweet-bonanza-super-scatter')">Main</button>
  </div>

  <div class="game">
    <img src="https://i.postimg.cc/sfBKKfFK/vs20olympgold.webp">
    <div class="game-title">Gates of Olympus Super Scatter</div>
    <button class="play-btn" onclick="go(this,'https://simulasikan.cfd/pragmatic-play/gates-of-olympus-super-scatter')">Main</button>
  </div>

  <div class="game">
    <img src="https://i.postimg.cc/DZGJJMDQ/vs20starprss.webp">
    <div class="game-title">Starlight Princess</div>
    <button class="play-btn" onclick="go(this,'https://nagaimam.xyz/pragmaticplay/starlightprincess')">Main</button>
  </div>

  <div class="game">
    <img src="https://i.postimg.cc/Jn37WVvS/vs20gatotx.webp">
    <div class="game-title">Gates of Gatot Kaca 1000</div>
    <button class="play-btn" onclick="go(this,'https://simulasikan.cfd/pragmatic-play/gates-of-gatotkaca-1000')">Main</button>
  </div>

  <!-- TAMBAHAN -->
  <div class="game"><img src="https://i.postimg.cc/wM3f6k1c/zeus.webp"><div class="game-title">Zeus vs Hades</div><button class="play-btn">Main</button></div>
  <div class="game"><img src="https://i.postimg.cc/9X6ZLwYq/doghouse.webp"><div class="game-title">Dog House</div><button class="play-btn">Main</button></div>
  <div class="game"><img src="https://i.postimg.cc/X7pXz0Yc/bonanza.webp"><div class="game-title">Bonanza Gold</div><button class="play-btn">Main</button></div>
  <div class="game"><img src="https://i.postimg.cc/Nf0w1H6L/wildwest.webp"><div class="game-title">Wild West Gold</div><button class="play-btn">Main</button></div>
  <div class="game"><img src="https://i.postimg.cc/KYt0hH8F/thor.webp"><div class="game-title">Power of Thor</div><button class="play-btn">Main</button></div>

</div>

<script>
function go(btn,url){
  btn.classList.add("clicked");

  setTimeout(()=>{
    window.open(url,"_blank");
    btn.classList.remove("clicked");
  },300);
}
</script>

</body>
</html>
