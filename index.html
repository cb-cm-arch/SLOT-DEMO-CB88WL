<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<title>CB88 DEMO</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:url('https://i.postimg.cc/HxqQT9qM/51918d4a-414e-4e49-b60e-6573301f0af5.jpg') no-repeat center center fixed;
  background-size:cover;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
  background:linear-gradient(90deg,#020024,#090979,#00d4ff);
  flex-wrap:wrap;
  position:sticky;
  top:0;
  z-index:999;
}

.logo img{height:34px;}

.btn-group{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.btn-login,.btn-daftar{
  background:#ffd700;
  color:#000;
  padding:7px 14px;
  border-radius:20px;
  font-weight:bold;
  text-decoration:none;
  font-size:14px;
}

/* PROVIDER MENU (SEMUA DEVICE) */
.provider-menu{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  padding:12px;
}

.provider-item{
  background:#0a2a66;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.provider-item img{
  height:35px;
}

.provider-item:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00c3ff;
}

/* SLIDER */
.banner{
  max-width:1200px;
  margin:10px auto;
  padding:0 10px;
}
.banner img{
  width:100%;
  border-radius:12px;
}

/* JACKPOT */
.jackpot-banner{
  max-width:1200px;
  margin:10px auto;
  position:relative;
  padding:0 10px;
}
.jackpot-banner img{
  width:100%;
  border-radius:12px;
}

.jackpot-number{
  position:absolute;
  top:55%;
  left:60%;
  transform:translate(-50%,-50%);
  font-size:clamp(20px,4vw,60px);
  font-weight:bold;
  color:#fff;
  white-space: nowrap;
}

/* GAME GRID */
.game-list{
  max-width:1200px;
  margin:15px auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;
  padding:10px;
}

.game{
  background:rgba(0,0,0,0.9);
  border-radius:14px;
  padding:8px;
  text-align:center;
}

.game img{
  width:100%;
  border-radius:10px;
}

.game-title{
  color:#fff;
  font-size:12px;
  margin:6px 0;
}

.play-btn{
  background:linear-gradient(45deg,#003cff,#00c3ff);
  color:#000;
  border:none;
  padding:10px;
  width:100%;
  border-radius:8px;
  font-weight:bold;
}

/* MOBILE */
@media(max-width:480px){
  .topbar{flex-direction:column;gap:8px;}
  .game-list{grid-template-columns:repeat(2,1fr);}
  .jackpot-number{left:59%;}
}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup-content{
  background:#0a1f44;
  color:#fff;
  padding:25px;
  border-radius:12px;
  font-size:18px;
  text-align:center;
  box-shadow:0 0 20px #00eaff;
}
</style>
</head>
