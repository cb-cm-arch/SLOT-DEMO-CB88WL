<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB88 DEMO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:
    url('https://i.postimg.cc/HxqQT9qM/51918d4a-414e-4e49-b60e-6573301f0af5.jpg') top center no-repeat,
    linear-gradient(#020024,#090979,#000);
  background-size:100% auto, cover;
  padding-bottom:70px;
}

/* 🔥 TOPBAR SULTAN */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:linear-gradient(90deg,#020024,#090979,#00d4ff);
  position:relative;
  overflow:hidden;
  box-shadow:0 0 25px rgba(0,200,255,0.8);
}

.topbar::before{
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:shine 4s linear infinite;
}

@keyframes shine{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  z-index:2;
}

.logo img{
  height:38px;
  filter:drop-shadow(0 0 10px #00eaff);
}

.logo-text{
  font-weight:bold;
  font-size:16px;
  background:linear-gradient(45deg,#ffd700,#fff,#00eaff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* BUTTON */
.btn-group{
  display:flex;
  gap:10px;
  z-index:2;
}

.btn-login{
  background:linear-gradient(45deg,#003cff,#00c3ff);
  color:#fff;
  padding:8px 18px;
  border-radius:25px;
  font-size:12px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 0 10px #00c3ff;
}

.btn-daftar{
  background:linear-gradient(45deg,#ffd700,#ffae00);
  color:#000;
  padding:8px 18px;
  border-radius:25px;
  font-size:12px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 0 10px #ffd700;
}

.header-line{
  height:4px;
  background:linear-gradient(to right,transparent,#00eaff,transparent);
}

/* BANNER */
.banner img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:10px;
}

/* GAME */
.game-list{
  max-width:1200px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:10px;
}

.game{
  background:rgba(0,0,0,0.75);
  border-radius:14px;
  padding:8px;
  text-align:center;
  transition:0.3s;
}

.game:hover{
  transform:translateY(-6px) scale(1.03);
  box-shadow:0 0 20px cyan;
}

.game img{
  width:100%;
  border-radius:10px;
}

.game-title{
  font-size:13px;
  color:#fff;
}

.play-btn{
  background:linear-gradient(45deg,#003cff,#00c3ff);
  color:#ffd700;
  border:none;
  padding:8px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* BOTTOM */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#111a4d;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.bottom-nav a{
  color:#ffd700;
  font-size:11px;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
  .game-list{ grid-template-columns:repeat(2,1fr); }
  .banner img{ height:180px; }
}

/* DESKTOP */
@media(min-width:1024px){
  .game-list{ grid-template-columns:repeat(6,1fr); }
  .banner img{ height:260px; }
}
</style>
</head>

<body>

</body>
