/* SLIDER */

/* JACKPOT */
.jackpot-banner{
  max-width:1200px;
  margin:10px auto;
  position:relative;
}
.jackpot-banner img{
  width:100%;
}

.jackpot-number{
  position:absolute;
  top:55%;
  left:60%;
  transform:translate(-50%,-50%);
  font-size:clamp(28px, 3.2vw, 60px);
  font-weight:bold;
  color:#ffffff;

  text-shadow:
    0 0 5px #00eaff,
    0 0 10px #00eaff,
    0 0 20px #00c3ff,
    0 0 40px #0099ff;

  animation: glowBlue 1.5s infinite alternate;
}

@keyframes glowBlue{
  from{ text-shadow:0 0 5px #00eaff; }
  to{ text-shadow:0 0 25px #00c3ff,0 0 40px #0099ff; }
}

/* GAME GRID */
.game-list{
  max-width:1200px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:10px;
}

.game{
  background:rgba(0,0,0,0.85);
  border-radius:14px;
  padding:8px;
  text-align:center;
  transition:0.3s;
}

.game:hover{
  transform:translateY(-8px) scale(1.05);
  box-shadow:0 0 15px #00eaff,0 0 30px #00eaff;
}

.game img{
  width:100%;
  border-radius:10px;
}

.game-title{
  color:#fff;
  font-size:13px;
}

/* 🔥 BUTTON FIX */

  color:#000; /* 🔥 TEXT HITAM */
  border:none;
  padding:8px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* GRID */
@media(max-width:768px){
  .game-list{grid-template-columns:repeat(2,1fr);}
}
@media(min-width:1024px){
