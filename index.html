<style>
body{

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 12px;
  background:linear-gradient(90deg,#020024,#090979,#00d4ff);
  flex-wrap:wrap;
}

.logo{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo img{height:32px;}

.logo-text{
  color:#ffd700;
  font-weight:bold;
  font-size:14px;
}

.btn-group{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.btn-login,.btn-daftar{
  background:#ffd700;
  color:#000;
  padding:6px 14px;
  border-radius:20px;
  font-weight:bold;
  text-decoration:none;
  font-size:13px;
}

/* 🔥 MOBILE FIX */
@media(max-width:480px){

  .topbar{
    flex-direction:column;
    align-items:flex-start;
    gap:8px;
  }

  .logo{
    flex-direction:column;
    align-items:flex-start;
  }

  .logo-text{
    margin-top:4px;
    font-size:13px;
  }

  .btn-group{
    width:100%;
    justify-content:flex-end;
  }
}

/* SLIDER */
.banner{max-width:1200px;margin:10px auto;}
.banner img{width:100%;border-radius:12px;}

/* JACKPOT */
.jackpot-banner{max-width:1200px;margin:10px auto;position:relative;}
.jackpot-banner img{width:100%;}

.jackpot-number{
  position:absolute;
  top:55%;
  left:60%;
  transform:translate(-50%,-50%);
  font-size:clamp(28px, 3.2vw, 60px);
  font-weight:bold;
  color:#fff;
  text-shadow:
    0 0 5px #00eaff,
    0 0 10px #00eaff,
    0 0 20px #00c3ff,
    0 0 40px #0099ff;
}

@media(min-width:1200px){
  .jackpot-number{font-size:56px;}
}

/* GAME */
.game-list{
  max-width:1200px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:10px;
}

.game{
  background:rgba(0,0,0,0.85);
  border-radius:14px;
  padding:8px;
  text-align:center;
  transition:0.3s;
}

.game:hover{
  transform:translateY(-8px) scale(1.05);
  box-shadow:0 0 15px #00eaff,0 0 30px #00eaff;
}

.game img{width:100%;border-radius:10px;}
.game-title{color:#fff;font-size:13px;}

.play-btn{
  background:linear-gradient(45deg,#003cff,#00c3ff);
  color:#ffd700;
  border:none;
  padding:8px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* GRID */
@media(max-width:768px){
  .game-list{grid-template-columns:repeat(2,1fr);}
}
@media(min-width:1024px){
  .game-list{grid-template-columns:repeat(6,1fr);}
}
</style>
