<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB88 DEMO</title>

<style>
body{
  margin:0;
  font-family:Arial;

  background:url('https://i.postimg.cc/HxqQT9qM/51918d4a-414e-4e49-b60e-6573301f0af5.jpg') no-repeat center center fixed;
  background-size:cover;

  padding-bottom:70px;
}

/* 🔥 TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:linear-gradient(90deg,#020024,#090979,#00d4ff);
  box-shadow:0 0 20px rgba(0,200,255,0.6);
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  height:38px;
  filter:none;
}

/* 🔥 TEXT SULTAN */
.logo-text{
  font-weight:bold;
  font-size:16px;
  letter-spacing:1px;

  background:linear-gradient(
    90deg,
    #ffd700,
    #fff8dc,
    #ffd700,
    #ffae00,
    #ffd700
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  position:relative;

  text-shadow:
    0 0 5px rgba(255,215,0,0.7),
    0 0 10px rgba(255,215,0,0.5);
}

/* ✨ SHINE TEXT */
.logo-text::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:200%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
  animation:shineText 4s linear infinite;
}

@keyframes shineText{
  0%{left:-100%;}
  100%{left:100%;}
}

/* 🔥 BUTTON SULTAN */
.btn-group{
  display:flex;
  gap:10px;
}

.btn-login,
.btn-daftar{
  background:linear-gradient(45deg,#ffd700,#ffae00);
  color:#000;
  padding:8px 18px;
  border-radius:25px;
  font-size:12px;
  text-decoration:none;
  font-weight:bold;
  position:relative;
  overflow:hidden;

  box-shadow:
    0 0 10px rgba(255,215,0,0.6),
    inset 0 0 5px rgba(255,255,255,0.3);

  transition:0.3s;
}

/* ✨ SHINE BUTTON */
.btn-login::before,
.btn-daftar::before{
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);
  top:0;
  left:-100%;
  animation:shineBtn 3s linear infinite;
}

@keyframes shineBtn{
  0%{left:-100%;}
  100%{left:100%;}
}

.btn-login:hover,
.btn-daftar:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px gold;
}

/* BANNER */
.banner img{
  width:100%;
  height:auto;
  max-height:260px;
  object-fit:contain;
  border-radius:10px;
}

/* GAME */
.game-list{
  max-width:1200px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:10px;
}

.game{
  background:rgba(0,0,0,0.7);
  border-radius:14px;
  padding:8px;
  text-align:center;
  transition:0.3s;
}

.game:hover{
  transform:translateY(-5px);
  box-shadow:0 0 15px gold;
}

.game img{
  width:100%;
  border-radius:10px;
}

.game-title{
  font-size:13px;
  color:#fff;
}

.play-btn{
  background:linear-gradient(45deg,#003cff,#00c3ff);
  color:#ffd700;
  border:none;
  padding:8px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* BOTTOM */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#111a4d;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.bottom-nav a{
  color:#ffd700;
  font-size:11px;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
  .game-list{ grid-template-columns:repeat(2,1fr); }
}

/* DESKTOP */
@media(min-width:1024px){
  .game-list{ grid-template-columns:repeat(6,1fr); }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <img src="https://cb88fulljpterus.com/storage/webpersonalize/7f9c6642-389e-4312-981d-de077aee6551.gif">
    <div class="logo-text">CB88 DEMO</div>
  </div>

  <div class="btn-group">
    <a href="https://cb88fulljpterus.com/register" class="btn-login">MASUK</a>
    <a href="https://cb88fulljpterus.com/register" class="btn-daftar">DAFTAR</a>
  </div>
</div>

<div class="banner">
  <img id="slider" src="https://king.cb88-rtpslot.com/banner/banner1.webp">
</div>

<div class="game-list">

  <div class="game">
    <img src="https://i.postimg.cc/vZ26qrvR/vswaysmahwblck.webp">
    <div class="game-title">Mahjong Wins 3</div>
    <button class="play-btn" onclick="openMahjong()">Main</button>
  </div>

  <div class="game">
    <img src="https://dsuown9evwz4y.cloudfront.net/Images/providers/PP/vs20swbonsup.jpg">
    <div class="game-title">Sweet Bonanza Super Scatter</div>
    <button class="play-btn" onclick="openSweet()">Main</button>
  </div>

  <div class="game">
    <img src="https://i.postimg.cc/sfBKKfFK/vs20olympgold.webp">
    <div class="game-title">Gates of Olympus Super Scatter</div>
    <button class="play-btn" onclick="openGates()">Main</button>
  </div>

  <div class="game">
    <img src="https://i.postimg.cc/DZGJJMDQ/vs20starprss.webp">
    <div class="game-title">Starlight Princess</div>
    <button class="play-btn" onclick="openStarlight()">Main</button>
  </div>

  <div class="game">
    <img src="https://i.postimg.cc/Jn37WVvS/vs20gatotx.webp">
    <div class="game-title">Gates of Gatot Kaca 1000</div>
    <button class="play-btn" onclick="openGatot()">Main</button>
  </div>

</div>

<script>
function openMahjong(){window.open("https://simulasikan.cfd/pragmatic-play/mahjong-wins-3","_blank");}
function openSweet(){window.open("https://simulasikan.cfd/pragmatic-play/sweet-bonanza-super-scatter","_blank");}
function openGates(){window.open("https://simulasikan.cfd/pragmatic-play/gates-of-olympus-super-scatter","_blank");}
function openStarlight(){window.open("https://nagaimam.xyz/pragmaticplay/starlightprincess","_blank");}
function openGatot(){window.open("https://simulasikan.cfd/pragmatic-play/gates-of-gatotkaca-1000","_blank");}
</script>

</body>
</html>
