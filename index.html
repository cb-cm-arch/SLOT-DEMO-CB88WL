<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB88 DEMO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('https://i.postimg.cc/HxqQT9qM/51918d4a-414e-4e49-b60e-6573301f0af5.jpg') no-repeat center center fixed;
  background-size:cover;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:linear-gradient(90deg,#020024,#090979,#00d4ff);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{ height:38px; }

.logo-text{
  color:#ffd700;
  font-weight:bold;
}

/* BUTTON */
.btn-group{
  display:flex;
  gap:10px;
}

.btn-login,.btn-daftar{
  background:#ffd700;
  color:#000;
  padding:8px 18px;
  border-radius:25px;
  font-weight:bold;
  text-decoration:none;
}

/* GRID */
.game-list{
  max-width:1200px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:10px;
}

.game{
  background:rgba(0,0,0,0.85);
  border-radius:14px;
  padding:8px;
  text-align:center;
  transition:0.3s;
}

/* HOVER */
.game:hover{
  transform:translateY(-8px) scale(1.05);
  box-shadow:
    0 0 15px #00eaff,
    0 0 30px #00eaff;
}

.game img{
  width:100%;
  border-radius:10px;
}

.game-title{
  color:#fff;
  font-size:13px;
}

/* 🔥 BUTTON MAIN */
.play-btn{
  background:linear-gradient(45deg,#003cff,#00c3ff);
  color:#ffd700;
  border:none;
  padding:8px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  position:relative;
  overflow:hidden;
  transition:0.1s;
}

/* tekan */
.play-btn:active{
  transform:scale(0.92);
}

/* flash efek */
.play-btn::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.4);
  top:0;
  left:-100%;
}

.play-btn.clicked::after{
  animation:flash 0.3s linear;
}

@keyframes flash{
  0%{ left:-100%; }
  100%{ left:100%; }
}

/* LOADING EFFECT */
.loading{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  font-size:20px;
  z-index:999;
  display:none;
}

/* MOBILE */
@media(max-width:768px){
  .game-list{ grid-template-columns:repeat(2,1fr); }
}

/* DESKTOP */
@media(min-width:1024px){
  .game-list{ grid-template-columns:repeat(6,1fr); }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">

  <div class="btn-group">

</div>

<!-- LOADING -->
<div class="loading" id="loading">LOADING...</div>

<div class="game-list">

    <button class="play-btn" onclick="go(this,'https://simulasikan.cfd/pragmatic-play/sweet-bonanza-super-scatter')">Main</button>

<script>
function go(btn,url){
  btn.classList.add("clicked");

  document.getElementById("loading").style.display="flex";

    document.getElementById("loading").style.display="none";
    btn.classList.remove("clicked");
  },400);
}
</script>

</html>
