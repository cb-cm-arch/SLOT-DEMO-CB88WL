<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGSOFT DEMO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
}

.provider-menu{
  display:flex;
  justify-content:center;
  gap:15px;
  padding:12px;
}

.provider-item{
  background:#0a2a66;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
}

.provider-item img{height:35px;}

.game-list{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;
  padding:10px;
}

.game{
  background:#111;
  border-radius:12px;
  padding:8px;
  text-align:center;
}

.game img{width:100%;border-radius:10px;}

.game-title{color:#fff;font-size:12px;margin:5px 0;}

.play-btn{
  background:#00c3ff;
  border:none;
  padding:8px;
  width:100%;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="provider-menu">

<div class="provider-item">
<img src="https://cb88fulljpterus.com/asset/gameprovider/logo/pgsoft.png">
</div>

<img src="https://cb88fulljpterus.com/asset/gameprovider/logo/pragmaticplay.png">
</a>
</div>

</div>
